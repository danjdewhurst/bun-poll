<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bun-poll — Create a Poll</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="page">
    <div class="container">
      <div class="brand">
        <div class="brand-icon">
          <svg aria-hidden="true" width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="2" y="3" width="3" height="10" rx="1.5" fill="#0c0b0a"/><rect x="6.5" y="5" width="3" height="8" rx="1.5" fill="#0c0b0a"/><rect x="11" y="1" width="3" height="12" rx="1.5" fill="#0c0b0a"/></svg>
        </div>
        <span class="brand-name">bun-poll</span>
      </div>

      <h1>Create a <span class="italic">poll</span></h1>

      <div class="card" id="form-card" style="animation-delay: 0.2s">
        <form id="poll-form">
          <div class="form-group">
            <label for="question">Your question</label>
            <input type="text" id="question" class="question-input" placeholder="What should we decide?" required>
          </div>

          <div class="form-group">
            <label>Options</label>
            <div id="options-list">
              <div class="option-row" style="animation-delay: 0.05s">
                <span class="option-number">1</span>
                <input type="text" name="option" placeholder="First option" required>
              </div>
              <div class="option-row" style="animation-delay: 0.1s">
                <span class="option-number">2</span>
                <input type="text" name="option" placeholder="Second option" required>
              </div>
            </div>
            <button type="button" id="add-option" class="btn btn-ghost mt-1">
              <svg aria-hidden="true" width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
              Add option
            </button>
          </div>

          <div class="toggle-row" id="toggle-multiple">
            <input type="checkbox" id="allow-multiple">
            <div class="toggle-track"></div>
            <label class="toggle-label" for="allow-multiple">Allow multiple selections</label>
          </div>

          <div class="form-group">
            <label for="expires">Expiry (minutes)</label>
            <input type="number" id="expires" min="1" placeholder="Leave blank for no expiry">
          </div>

          <button type="submit" class="btn btn-primary" id="submit-btn" style="width: 100%">
            Create Poll
            <svg aria-hidden="true" width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 7h12M8 2l5 5-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>

          <div id="error" class="error hidden"></div>
        </form>
      </div>

      <div id="result" class="card hidden" style="animation-delay: 0.1s">
        <div class="success-header">
          <div class="success-icon">&#10003;</div>
          <div>
            <div class="success-title">Poll created</div>
            <div class="success-subtitle">Share the link below to start collecting votes</div>
          </div>
        </div>

        <div class="share-group">
          <div class="share-label">Share link</div>
          <div class="share-box" id="share-link" data-copy>
            <span class="link-text"></span>
            <svg aria-hidden="true" class="copy-icon" width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="5" y="5" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M3 11V3.5A1.5 1.5 0 014.5 2H11" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          </div>
        </div>

        <div class="share-group">
          <div class="share-label">Admin link (keep this private)</div>
          <div class="share-box" id="admin-link" data-copy>
            <span class="link-text"></span>
            <svg aria-hidden="true" class="copy-icon" width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="5" y="5" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M3 11V3.5A1.5 1.5 0 014.5 2H11" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="copy-toast" id="copy-toast">Copied to clipboard</div>

  <script src="./home.js"></script>
</body>
</html>
