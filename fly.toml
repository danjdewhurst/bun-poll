app = 'bun-poll'
primary_region = 'lhr'

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1

[mounts]
  source = 'data'
  destination = '/data'

[[http_service.checks]]
  grace_period = '5s'
  interval = '30s'
  method = 'GET'
  path = '/health'
  timeout = '5s'
